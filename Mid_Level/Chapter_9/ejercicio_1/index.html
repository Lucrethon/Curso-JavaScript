<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css">
    <title>Document</title>
</head>
<body>
    <h1></h1>

        <form>
        <h2>Formulario de Reparación</h2>

        <div class="form_input">
            <label for="nombre">Nombre completo</label>
            <input id="nombre" type="text" placeholder="Cofla Perez" required="">
        </div>

        <div class="form_input">
            <label for="correo">Correo electronico</label>
            <input id="correo" type="email" placeholder="pepito@gmail.com" required="">
        </div>

        <div class="form_input">
            <label for="materia">Materia a reparar</label>
            <input id="materia" type="text" placeholder="Algebra" required="">
        </div>

        <div class="form_input form_submit">
            <input type="submit" value="Solicitar Reparacion" id="submit">
        </div>

    </form>

    <div class="resultado"></div>


<script src="ejercicio.js"></script>
</body>
</html>
